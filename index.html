<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>경조 기안 보관함 - 원본 양식 완벽 반영</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6f7; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 설정 */
        .sidebar { width: 350px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .sidebar h2 { font-size: 18px; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 3px; }
        input { width: 100%; padding: 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        
        /* 메인 영역 */
        .main-pane { flex: 1; display: flex; flex-direction: column; min-width: 900px; }
        .archive-pane { height: 30%; background: #fff; border-bottom: 1px solid #ddd; padding: 15px; overflow-y: auto; }
        .archive-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .archive-table th { background: var(--primary); color: white; padding: 8px; position: sticky; top: 0; }
        .archive-table td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; cursor: pointer; }
        .archive-table tr:hover td { background: #f0f7ff; }

        /* 미리보기 영역 */
        .preview-pane { flex: 1; padding: 20px; overflow: auto; background: #888; display: flex; flex-direction: column; align-items: center; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-copy { background: #27ae60; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-new { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        /* 렌더링 컨테이너: 원본 크기 유지를 위해 scale 조정 */
        #render-wrapper { background: white; padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.3); transform: scale(0.8); transform-origin: top center; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>✍️ 기안 정보 입력</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>보관용 제목</label><input type="text" id="doc-title" placeholder="목록 구분용 제목"></div>
    <div class="form-group"><label>당사와의 관계</label><input type="text" id="rel" oninput="updatePreview()"></div>
    <div class="form-group"><label>회사명/소속</label><input type="text" id="dept" oninput="updatePreview()"></div>
    <div class="form-group"><label>성명/직급</label><input type="text" id="name" oninput="updatePreview()"></div>
    <div class="form-group"><label>연락처</label><input type="text" id="phone" oninput="updatePreview()"></div>
    <div class="form-group"><label>경조구분</label><input type="text" id="type" oninput="updatePreview()"></div>
    <div class="form-group"><label>목적(사유)</label><input type="text" id="reason" oninput="updatePreview()"></div>
    <div class="form-group"><label>경조일자</label><input type="text" id="date" oninput="updatePreview()"></div>
    <div class="form-group"><label>주소</label><input type="text" id="addr" oninput="updatePreview()"></div>
    <div class="form-group"><label>보내는 사람(명의)</label><input type="text" id="sender" oninput="updatePreview()"></div>
    <div class="form-group"><label>지급방법/계좌</label><input type="text" id="method" oninput="updatePreview()"></div>
    
    <div class="btn-row" style="margin-top:20px;">
        <button class="btn-save" onclick="saveDraft()">저장</button>
        <button class="btn-new" onclick="resetForm()">지우기</button>
    </div>
</div>

<div class="main-pane">
    <div class="archive-pane">
        <h3 style="margin:0 0 10px 0;">📂 기안 보관함</h3>
        <table class="archive-table">
            <thead><tr><th>저장일</th><th>제목</th><th>성명</th><th>삭제</th></tr></thead>
            <tbody id="archive-list"></tbody>
        </table>
    </div>
    
    <div class="preview-pane">
        <div class="btn-row">
            <button class="btn-copy" onclick="copyHTML()">📋 현재 양식 HTML 복사</button>
        </div>
        <div id="render-wrapper">
            <div id="render-area"></div>
        </div>
    </div>
</div>
