<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>경조 기안 보관함 시스템</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 왼쪽: 입력창 */
        .editor-pane { width: 400px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* 오른쪽: 리스트 및 미리보기 */
        .main-pane { flex: 1; display: flex; flex-direction: column; }
        
        /* 상단: 보관함 리스트 */
        .archive-section { height: 35%; background: #fff; border-bottom: 2px solid #ddd; padding: 15px; overflow-y: auto; }
        .archive-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .archive-table th { background: var(--primary); color: white; padding: 8px; position: sticky; top: 0; }
        .archive-table td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; cursor: pointer; }
        .archive-table tr:hover { background: #f0f7ff; }

        /* 하단: 미리보기 및 액션 */
        .preview-section { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; justify-content: center; }
        
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); color: white; }
        .btn-copy { background: #27ae60; color: white; }
        .btn-new { background: #95a5a6; color: white; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 10px; font-size: 11px; }
    </style>
</head>
<body>

<div class="editor-pane">
    <h2>기안 작성</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>기안 제목(관리용)</label><input type="text" id="doc-title" placeholder="예: 4월 홍길동 과장 결혼"></div>
    <div class="form-group"><label>당사와의 관계</label><input type="text" id="rel"></div>
    <div class="form-group"><label>회사명/소속</label><input type="text" id="dept"></div>
    <div class="form-group"><label>성명/직급</label><input type="text" id="name"></div>
    <div class="form-group"><label>연락처</label><input type="text" id="phone"></div>
    <div class="form-group"><label>경조구분</label><input type="text" id="type"></div>
    <div class="form-group"><label>목적(사유)</label><input type="text" id="reason"></div>
    <div class="form-group"><label>경조일자</label><input type="text" id="date"></div>
    <div class="form-group"><label>보내는 명의</label><input type="text" id="sender"></div>
    <div class="form-group"><label>지급방법/계좌</label><input type="text" id="method"></div>
    
    <div class="btn-row" style="margin-top:20px;">
        <button class="btn-save" onclick="saveDraft()">보관함에 저장/수정</button>
        <button class="btn-new" onclick="resetForm()">새로 쓰기</button>
    </div>
</div>

<div class="main-pane">
    <div class="archive-section">
        <h3 style="margin-top:0;">📂 기안 보관함</h3>
        <table class="archive-table">
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>제목</th>
                    <th>성명</th>
                    <th>구분</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="archive-list"></tbody>
        </table>
    </div>
    
    <div class="preview-section">
        <div class="btn-row">
            <button class="btn-copy" onclick="copyHTML()">현재 양식 HTML 복사</button>
        </div>
        <div id="render-area"></div>
    </div>
</div>

<script>
    let drafts = JSON.parse(localStorage.getItem('myDrafts') || '[]');

    function saveDraft() {
        const id = document.getElementById('edit-id').value || Date.now();
        const draft = {
            id: id,
            saveDate: new Date().toLocaleDateString(),
            docTitle: document.getElementById('doc-title').value || '제목 없음',
            rel: document.getElementById('rel').value,
            dept: document.getElementById('dept').value,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            type: document.getElementById('type').value,
            reason: document.getElementById('reason').value,
            date: document.getElementById('date').value,
            sender: document.getElementById('sender').value,
            method: document.getElementById('method').value
        };

        const index = drafts.findIndex(d => d.id == id);
        if(index > -1) drafts[index] = draft;
        else drafts.push(draft);

        localStorage.setItem('myDrafts', JSON.stringify(drafts));
        renderList();
        alert("보관함에 저장되었습니다.");
    }

    function renderList() {
        const list = document.getElementById('archive-list');
        list.innerHTML = drafts.map(d => `
            <tr onclick="loadDraft('${d.id}')">
                <td>${d.saveDate}</td>
                <td>${d.docTitle}</td>
                <td>${d.name}</td>
                <td>${d.type}</td>
                <td><button class="btn-del" onclick="deleteDraft(event, '${d.id}')">삭제</button></td>
            </tr>
        `).join('');
    }

    function loadDraft(id) {
        const d = drafts.find(item => item.id == id);
        document.getElementById('edit-id').value = d.id;
        document.getElementById('doc-title').value = d.docTitle;
        document.getElementById('rel').value = d.rel;
        document.getElementById('dept').value = d.dept;
        document.getElementById('name').value = d.name;
        document.getElementById('phone').value = d.phone;
        document.getElementById('type').value = d.type;
        document.getElementById('reason').value = d.reason;
        document.getElementById('date').value = d.date;
        document.getElementById('sender').value = d.sender;
        document.getElementById('method').value = d.method;
        updatePreview();
    }

    function deleteDraft(e, id) {
        e.stopPropagation();
        if(!confirm("정말 삭제할까요?")) return;
        drafts = drafts.filter(d => d.id != id);
        localStorage.setItem('myDrafts', JSON.stringify(drafts));
        renderList();
        resetForm();
    }

    function resetForm() {
        document.querySelectorAll('.editor-pane input').forEach(i => i.value = '');
        updatePreview();
    }

    function updatePreview() {
        const v = {
            rel: document.getElementById('rel').value || '',
            dept: document.getElementById('dept').value || '',
            name: document.getElementById('name').value || '',
            phone: document.getElementById('phone').value || '',
            type: document.getElementById('type').value || '',
            reason: document.getElementById('reason').value || '',
            date: document.getElementById('date').value || '',
            sender: document.getElementById('sender').value || '',
            method: document.getElementById('method').value || ''
        };

        const html = `
        <table border="1" cellpadding="5" cellspacing="0" style="border-collapse: collapse; width: 700px; font-family: '맑은 고딕'; font-size: 10pt;">
            <tr style="height:50px;"><td colspan="4" style="text-align:center; font-size:18pt; font-weight:bold;">경조화환 & 경조비 신청서</td></tr>
            <tr style="background:#eee;"><td colspan="4"><b>■ 인적사항</b></td></tr>
            <tr><td width="120" style="background:#fff2cc; text-align:center;">당사와의 관계</td><td colspan="3">${v.rel}</td></tr>
            <tr><td style="background:#fff2cc; text-align:center;">소속</td><td>${v.dept}</td><td width="100" style="background:#fff2cc; text-align:center;">성명/직급</td><td>${v.name}</td></tr>
            <tr><td style="background:#fff2cc; text-align:center;">연락처</td><td colspan="3">${v.phone}</td></tr>
            <tr style="background:#eee;"><td colspan="4"><b>■ 경조내용</b></td></tr>
            <tr><td style="background:#fff2cc; text-align:center;">경조구분</td><td>${v.type}</td><td style="background:#fff2cc; text-align:center;">목적(사유)</td><td>${v.reason}</td></tr>
            <tr><td style="background:#fff2cc; text-align:center;">경조일자</td><td colspan="3">${v.date}</td></tr>
            <tr><td style="background:#fff2cc; text-align:center;">보내는 명의</td><td colspan="3">${v.sender}</td></tr>
            <tr style="background:#eee;"><td colspan="4"><b>■ 지급정보</b></td></tr>
            <tr><td style="background:#fff2cc; text-align:center;">지급방법/계좌</td><td colspan="3">${v.method}</td></tr>
        </table>`;
        document.getElementById('render-area').innerHTML = html;
        return html;
    }

    function copyHTML() {
        navigator.clipboard.writeText(updatePreview()).then(() => alert("HTML이 복사되었습니다!"));
    }

    // 모든 입력창에 변경 이벤트 연결
    document.querySelectorAll('input').forEach(el => el.addEventListener('input', updatePreview));
    renderList();
    updatePreview();
</script>

</body>
</html>
