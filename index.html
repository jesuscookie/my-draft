<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 기록 저장소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { background-color: #000000; color: #e5e5e5; }
        .menu-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl text-white">WORK LOG</div>
                <div class="hidden md:flex space-x-8">
                    <button onclick="showSection('excel')" class="nav-link menu-active py-2">엑셀 뷰어</button>
                    <button onclick="showSection('pdf')" class="nav-link py-2">PDF 요약</button>
                    <button onclick="showSection('export')" class="nav-link py-2">CSV 내보내기</button>
                </div>
                <div class="md:hidden">
                    <button onclick="toggleMobileMenu()" class="text-zinc-400">☰</button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden bg-zinc-900 border-b border-zinc-800 md:hidden">
            <button onclick="showSection('excel')" class="block w-full text-left px-4 py-3 border-b border-zinc-800">엑셀 뷰어</button>
            <button onclick="showSection('pdf')" class="block w-full text-left px-4 py-3 border-b border-zinc-800">PDF 요약</button>
            <button onclick="showSection('export')" class="block w-full text-left px-4 py-3">CSV 내보내기</button>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4">
        
        <section id="excel-section" class="content-section">
            <h2 class="text-2xl font-bold mb-4 text-blue-400">📊 엑셀 파일 출력</h2>
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800 mb-6">
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
            </div>
            <div id="excelDisplay" class="overflow-x-auto bg-zinc-900 rounded-lg border border-zinc-800">
                <p class="p-10 text-center text-zinc-500">파일을 업로드하면 이곳에 내용이 표시됩니다.</p>
            </div>
        </section>

        <section id="pdf-section" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-4 text-green-400">📄 PDF 내용 추출 및 요약</h2>
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800 mb-6">
                <input type="file" id="pdfInput" accept=".pdf" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800">
                    <h3 class="font-bold mb-2 text-zinc-400">원문 텍스트</h3>
                    <textarea id="pdfRawText" class="w-full h-64 bg-black border border-zinc-700 p-3 rounded text-sm overflow-y-auto" readonly placeholder="PDF에서 추출된 텍스트..."></textarea>
                </div>
                <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800">
                    <h3 class="font-bold mb-2 text-zinc-400">간이 요약 (키워드 빈도)</h3>
                    <div id="pdfSummary" class="w-full h-64 bg-black border border-zinc-700 p-3 rounded text-sm overflow-y-auto">
                        요약 결과가 여기에 표시됩니다.
                    </div>
                </div>
            </div>
        </section
